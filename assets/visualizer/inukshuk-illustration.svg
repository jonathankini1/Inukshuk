<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" role="img" aria-label="Illustrated stone Inukshuk">
  <defs>
    <linearGradient id="stoneA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b8b0a2"/>
      <stop offset="0.45" stop-color="#8f887d"/>
      <stop offset="1" stop-color="#625f59"/>
    </linearGradient>
    <linearGradient id="stoneB" x1="0" y1="0" x2="1" y2="0.8">
      <stop offset="0" stop-color="#9f988c"/>
      <stop offset="0.55" stop-color="#77736c"/>
      <stop offset="1" stop-color="#54514c"/>
    </linearGradient>
    <filter id="stoneTexture" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="3" seed="12" result="noise"/>
      <feComposite in="noise" in2="SourceAlpha" operator="in" result="clippedNoise"/>
      <feBlend in="SourceGraphic" in2="clippedNoise" mode="multiply"/>
    </filter>
    <filter id="stoneShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="8" dy="12" stdDeviation="9" flood-color="#161513" flood-opacity="0.38"/>
    </filter>
  </defs>
  <g filter="url(#stoneShadow)" stroke="#4d4b47" stroke-width="5" stroke-linejoin="round">
    <path d="M246 54 353 47 385 69 378 202 229 210 220 87Z" fill="url(#stoneA)" filter="url(#stoneTexture)"/>
    <path d="M63 244 541 222 558 245 547 303 57 321 40 295Z" fill="url(#stoneB)" filter="url(#stoneTexture)"/>
    <path d="M171 329 430 315 452 339 437 438 165 450 147 424 151 354Z" fill="url(#stoneA)" filter="url(#stoneTexture)"/>
    <path d="M131 464 469 451 491 478 480 594 124 605 105 573 110 493Z" fill="url(#stoneB)" filter="url(#stoneTexture)"/>
    <path d="M154 616 277 611 272 851 248 872 153 861 137 835 143 648Z" fill="url(#stoneA)" filter="url(#stoneTexture)"/>
    <path d="M331 610 454 607 470 834 449 864 348 870 326 847 320 642Z" fill="url(#stoneA)" filter="url(#stoneTexture)"/>
  </g>
</svg>
